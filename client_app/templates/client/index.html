<!DOCTYPE html>
{% load static %}
<html lang="he" dir="rtl">

<head>
    <title>{{Title}}</title>
    <link rel="stylesheet" href="{% static 'css/../../static/css/main.css' %}" type="text/css">
</head>



    <body>

<nav class="Navigation">
    <button id="ToSchedule" class="float-left submit-button" >לו״ז</button>

    <script type="text/javascript">
        document.getElementById("ToSchedule").onclick = function () {
            location.href = "schedule/schedule_treatment";
        }
    </script>
</nav>

    <h1> מטופלים </h1>
    <nav>
        {% for client in Clients %}

            <p> <a href="/client/{{ client.id }}"> <strong  class="ClientName" style="color: {{ client.color }}">{{client}}</strong>/מספר טיפולים:  {{ client.treatments.all.count }} </a>

        {% endfor %}
    </nav>

    <p>

<button id="myButton2" class="float-left submit-button" >מטופל חדש</button>

<script type="text/javascript">
    document.getElementById("myButton2").onclick = function () {
        location.href = "new_client";
    };

</script>

    </body>

</html>
