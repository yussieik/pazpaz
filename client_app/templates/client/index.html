<!DOCTYPE html>
{% extends 'base.html' %}

{% block content %}

<body>

<button id="myButton1" class="float-left submit-button" >עדכון תיק</button>

<script type="text/javascript">
    document.getElementById("myButton1").onclick = function () {
        location.href = "new_record";
    };
</script>

<button id="myButton2" class="float-left submit-button" >מטופל חדש</button>

<script type="text/javascript">
    document.getElementById("myButton2").onclick = function () {
        location.href = "new_client";
    };

</script>

<br>

{% for client in Clients %}

    <br>{{client}} מספר תיקים: {{ client.record_patient.all.count }}

{% endfor %}

</body>
{% endblock %}
