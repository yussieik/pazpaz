<!DOCTYPE html>
{% extends 'base.html' %}

{% block content %}

    <body>
    <form method="POST">
        {% csrf_token %}
        <table>
            {{form.as_table}}
        </table>
        <input type="submit" value="הוספה">
    </form>

    {% if formInfo %}
        {% for info in formInfo %}
            <ul class="list">
                <li>{{ info }}</li>
            </ul>
        {% endfor %}
    {% endif %}

    </body>
{% endblock %}
