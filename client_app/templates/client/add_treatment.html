<!DOCTYPE html>
<html lang="he" dir="rtl">

{% block content %}
    <h1> {{ client }}</h1>
    <body>
    <form method="POST">
        {% csrf_token %}
        <table>
            {{form.as_table}}
        </table>
        <input type="submit" value="הוספה">
    </form>

    {% if formInfo %}
        {% for info in formInfo %}
            <ul class="list">
                <li>{{ info }}</li>
            </ul>
        {% endfor %}
    {% endif %}

    </body>
{% endblock %}

</html>
