<!DOCTYPE html>
{% load static %}
<html lang="he" dir="rtl">

<head>
    <title>{{Title}}</title>
    <link rel="stylesheet" href="{% static 'css/../../static/css/main.css' %}" type="text/css">
</head>
<body>

<button id="BackButton" class="float-left submit-button" >חזרה</button>

<script type="text/javascript">
    document.getElementById("BackButton").onclick = function () {
        location.href = "../{{ client.id }}";
    }

</script>

<form method="POST">
    {% csrf_token %}
    <table class="UpdateClient">

            {{client_form.as_table}}
            {{record_form.as_table}}
        
    </table>
    <input type="submit" value="עדכון">
</form>

</body>
</html>
